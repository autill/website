<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Andere Meta-Tags und Links -->
  {% include google_tag.html %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/blog.html">Blog</a>
          </li>
          <!-- Add more navigation links as needed -->
        </ul>
      </div>
    </nav>
  </header>
  <main class="container mt-4">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ site.baseurl }}/assets/js/bootstrap.bundle.min.js"></script>
  <script src="{{ site.baseurl }}/assets/js/script.js"></script>
</body>
</html>
