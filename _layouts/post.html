<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>{{ page.title }} - Blog | Flexor Bootstrap Template</title>
  <meta content="{{ page.description | default: 'Default description if none provided' }}" name="description">
  <meta content="" name="keywords">

  <!-- Favicons -->
  <link href="{{ '/assets/img/favicon.png' | relative_url }}" rel="icon">
  <link href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="{{ '/assets/vendor/bootstrap/css/bootstrap.min.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/assets/vendor/bootstrap-icons/bootstrap-icons.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/assets/vendor/aos/aos.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/assets/vendor/glightbox/css/glightbox.min.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/assets/vendor/swiper/swiper-bundle.min.css' | relative_url }}" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="{{ '/assets/css/main.css' | relative_url }}" rel="stylesheet">
</head>

<body class="blog-details-page">
  {% include header.html %}

  <main class="main">
    <div class="page-title">
      <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">{{ page.title }}</h1>
        <nav class="breadcrumbs">
          <ol>
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li class="current">Blog Details</li>
          </ol>
        </nav>
      </div>
    </div>

    <div class="container">
      <div class="row">
        <div class="col-lg-8">
          <section id="blog-details" class="blog-details section">
            <article class="article">
              <div class="post-img">
                <img src="{{ page.image | prepend: site.baseurl }}" alt="" class="img-fluid">
              </div>

              <h2 class="title">{{ page.title }}</h2>

              <div class="meta-top">
                <ul>
                  <li class="d-flex align-items-center"><i class="bi bi-person"></i> <a href="#">{{ page.author }}</a></li>
                  <li class="d-flex align-items-center"><i class="bi bi-clock"></i> <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date_to_string }}</time></a></li>
                  <li class="d-flex align-items-center"><i the bi bi-chat-dots"></i> <a href="#">12 Comments</a></li>
                </ul>
              </div>

              <div class="content">
                {{ content }}
              </div>
            </article>
          </section>
        </div>
      </div>
    </div>
  </main>

  {% include footer.html %}
</body>
</html>
